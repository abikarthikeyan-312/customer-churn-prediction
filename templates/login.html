{% extends "base.html" %}
{% block content %}

<div style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
    <div class="card fade-in" style="width: 100%; max-width: 450px; padding: 40px;">
        <div style="text-align: center; margin-bottom: 30px;">
            <i class="fa-solid fa-cube" style="font-size: 3rem; color: var(--accent-blue); margin-bottom: 15px;"></i>
            <h2 style="color: var(--text-primary); font-size: 1.8rem;">Welcome Back</h2>
            <p class="text-muted">Sign in to Churn AI Analytics</p>
        </div>

        <form method="POST" action="/login" class="form-container">
            <div class="form-group">
                <label style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 8px; display: block;">Username</label>
                <div style="position: relative;">
                    <i class="fa-solid fa-user" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                    <input type="text" name="username" required class="glass-input" style="padding-left: 45px; width: 100%;" placeholder="Enter your username">
                </div>
            </div>

            <div class="form-group" style="margin-top: 20px;">
                <label style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 8px; display: block;">Password</label>
                <div style="position: relative;">
                    <i class="fa-solid fa-lock" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                    <input type="password" name="password" required class="glass-input" style="padding-left: 45px; width: 100%;" placeholder="Enter your password">
                </div>
            </div>

            <button type="submit" class="primary-btn pulse-hover" style="width: 100%; margin-top: 30px; font-size: 1.1rem; padding: 12px;">
                Sign In <i class="fa-solid fa-arrow-right-to-bracket" style="margin-left: 8px;"></i>
            </button>
            
            <div style="text-align: center; margin-top: 25px;">
                <a href="{{ url_for('register') }}" style="color: var(--accent-green); text-decoration: none; font-size: 0.9rem;">Don't have an account? Register</a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
